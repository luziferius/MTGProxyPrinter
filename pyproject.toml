[build-system]
requires = [
    "setuptools>=51",
    "wheel",
    "PyQt5",
    "build",
    "tox >= 3.8",
]
build-backend = "setuptools.build_meta"

[tool.tox]
legacy_tox_ini = """
[tox]

envlist = 
    py3{8,9,10}-{unit_tests,test_create_bundle}

[testenv]

# Let Qt5 render offscreen, so that running tests don’t open windows or try to access the local system’s display
# This also prevents unwanted user interactions with the widgets under test
setenv =
    QT_QPA_PLATFORM = offscreen

# This can be used in combination with the default platform plugin to visibly render the Qt widgets under test
#passenv =
#    DISPLAY


deps =
    test_create_bundle: cx_Freeze >= 6.6
    unit_tests: pytest
    unit_tests: pytest-cov
    unit_tests: pytest-timeout
    unit_tests: pytest-qt
    unit_tests: PyHamcrest >= 1.8.1
    build
    PyQt5
    ijson >= 3.1.0
    pint
    delegateto >= 1.5


commands = 
    unit_tests: pytest tests
    test_create_bundle: python setup_cx_freeze.py build_exe --build-exe build{/}bundle_test
    test_create_bundle: {toxinidir}{/}build{/}bundle_test{/}MTGProxyPrinter --version

"""
